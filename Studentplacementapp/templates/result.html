<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Prediction Result</h1>

    
    <p><strong>Prediction Confidence</strong></p>

<div class="progress">
    <div class="progress-fill" style="width: {{ probability }}%;"></div>
</div>

    
<p>{{ probability }}%</p>

    {% if suggestions %}
    <div class="suggestion-box">

        <h3>📈 Areas to Improve</h3>

        <ul>
            {% for suggestion in suggestions %}
            <li>{{ suggestion }}</li>
            {% endfor %}
        </ul>

    </div>
    {% endif %}
    {% if "Likely to be placed" in result %}
    <h2 class="success">{{ result }}</h2>
    {% else %}
    <h2 class="danger">{{ result }}</h2>
    {% endif %}

    <div class="center">

        <a href="/predict">
            <button>Predict Again</button>
        </a>

        <a href="/">
            <button>Home</button>
        </a>

    </div>

</div>

</body>
</html>
