<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Case File</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="page">

        <div class="filecode">
            <span>Student Records Office</span>
            <span>File Ref. SP-01</span>
        </div>

        <div class="sheet">
            <span class="corner-bl"></span><span class="corner-br"></span>

            <p class="eyebrow">Case Intake</p>
            <h1 class="display">Student Record</h1>

            <form action="/predict" method="POST">

                <p class="section-label">I. Academic Record</p>
                <div class="field-grid">
                    <div class="field">
                        <label>CGPA (0–10)</label>
                        <input type="number" step="0.01" min="0" max="10" name="cgpa" placeholder="e.g. 8.5" required>
                    </div>
                    <div class="field">
                        <label>10th Percentage</label>
                        <input type="number" step="0.01" min="0" max="100" name="ssc" placeholder="e.g. 88" required>
                    </div>
                    <div class="field">
                        <label>12th Percentage</label>
                        <input type="number" step="0.01" min="0" max="100" name="hsc" placeholder="e.g. 84" required>
                    </div>
                </div>

                <p class="section-label">II. Experience &amp; Skills</p>
                <div class="field-grid">
                    <div class="field">
                        <label>Internships Completed</label>
                        <input type="number" min="0" name="internships" placeholder="e.g. 2" required>
                    </div>
                    <div class="field">
                        <label>Projects Completed</label>
                        <input type="number" min="0" name="projects" placeholder="e.g. 3" required>
                    </div>
                    <div class="field">
                        <label>Workshops / Certifications</label>
                        <input type="number" min="0" name="workshops" placeholder="e.g. 2" required>
                    </div>
                    <div class="field">
                        <label>Soft Skills Rating (1–10)</label>
                        <input type="number" min="1" max="10" name="softskills" placeholder="e.g. 8" required>
                    </div>
                    <div class="field">
                        <label>Extracurricular Activities</label>
                        <select name="extracurricular">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Placement Training Completed</label>
                        <select name="training">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>
                </div>

                <p class="section-label">III. Test Scores</p>
                <div class="field-grid">
                    <div class="field">
                        <label>Aptitude Test Score</label>
                        <input type="number" min="0" max="100" name="aptitude" placeholder="e.g. 85" required>
                    </div>
                </div>

                <div class="center">
                    <button type="submit">File &amp; Predict →</button>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
