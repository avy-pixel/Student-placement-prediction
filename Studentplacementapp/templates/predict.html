<!DOCTYPE html>
<html>
<head>
    <title>Predict Placement</title>
</head>
<body>

<h1>Student Placement Prediction</h1>
<form action="/predict" method="POST">

    <label>CGPA</label><br>
    <input type="number" step="0.01" name="cgpa" required><br><br>

    <label>Number of Internships</label><br>
    <input type="number" name="internships" required><br><br>

    <label>Projects Completed</label><br>
    <input type="number" name="projects" required><br><br>

    <label>Workshops / Certifications</label><br>
    <input type="number" name="workshops" required><br><br>

    <label>Aptitude Test Score</label><br>
    <input type="number" name="aptitude" required><br><br>

    <label>Soft Skills Rating (1-5)</label><br>
    <input type="number" name="softskills" min="1" max="5" required><br><br>

    <label>Extracurricular Activities</label><br>
    <select name="extracurricular">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select><br><br>

    <label>Placement Training</label><br>
    <select name="training">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select><br><br>

    <label>10th Percentage</label><br>
    <input type="number" step="0.01" name="ssc" required><br><br>

    <label>12th Percentage</label><br>
    <input type="number" step="0.01" name="hsc" required><br><br>

    <button type="submit">Predict Placement</button>

</form>

</body>
</html>
